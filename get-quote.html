<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPD | اطلب عرض سعر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0A84FF; --secondary: #06B6D4; --dark-bg: #07111f; --dark-card: #101b2d; --light-bg: #f8fafc; --light-card: #ffffff; --text-dark: #ffffff; --text-light: #0f172a; --border-dark: rgba(255,255,255,0.08); --border-light: rgba(0,0,0,0.08); }
        body { font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body.dark { background: var(--dark-bg); color: var(--text-dark); }
        body.light { background: var(--light-bg); color: var(--text-light); }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(var(--border-dark) 1px, transparent 1px), linear-gradient(90deg, var(--border-dark) 1px, transparent 1px); background-size: 50px 50px; z-index: -2; }
        .glow { position: fixed; width: 500px; height: 500px; background: var(--primary); filter: blur(180px); opacity: 0.2; top: -100px; right: -100px; z-index: -1; }
        header { position: fixed; top: 0; width: 100%; padding: 18px 8%; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-dark); z-index: 1000; }
        body.light header { background: rgba(248,250,252,0.9); }
        body.dark header { background: rgba(7,17,31,0.85); }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo img { width: 48px; height: 48px; border-radius: 50%; }
        nav { display: flex; gap: 28px; }
        nav a { text-decoration: none; font-weight: 600; color: inherit; }
        .header-actions { display: flex; gap: 15px; }
        .theme-toggle { background: rgba(255,255,255,0.1); border: none; border-radius: 40px; padding: 8px 14px; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 10px 24px; border-radius: 40px; color: white; text-decoration: none; font-weight: 700; }
        .container { padding: 140px 8% 80px; max-width: 700px; margin: 0 auto; }
        .quote-card { background: var(--dark-card); border: 1px solid var(--border-dark); border-radius: 32px; padding: 40px; }
        body.light .quote-card { background: white; }
        input, select, textarea { width: 100%; padding: 14px; margin: 12px 0; border-radius: 16px; border: 1px solid var(--border-dark); background: transparent; color: inherit; }
        footer { text-align: center; padding: 40px 8%; border-top: 1px solid var(--border-dark); }
    </style>
</head>
<body class="dark">
<div class="bg-grid"></div><div class="glow"></div>
<header>
    <a href="index.html" class="logo"><img src="./assest/images/logo/CPD.png" alt="logo" onerror="this.src='https://placehold.co/48x48?text=CPD'"><span>CyberPath Digital</span></a>
    <nav><a href="index.html">الرئيسية</a><a href="services.html">الخدمات</a><a href="portfolio.html">أعمالنا</a><a href="contact.html">تواصل معنا</a></nav>
    <div class="header-actions"><button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button><a href="get-quote.html" class="btn-primary">اطلب عرض سعر</a></div>
</header>
<main>
    <div class="container">
        <div class="quote-card">
            <h2 style="text-align:center;">طلب عرض سعر</h2>
            <p style="text-align:center; margin-bottom:30px;">املأ النموذج وسنرد عليك خلال 24 ساعة</p>
            <form action="https://wa.me/966557450188" method="GET">
                <input type="text" placeholder="الاسم الكامل" required>
                <input type="tel" placeholder="رقم الهاتف" required>
                <select>
                    <option>مواقع الشركات</option>
                    <option>متجر إلكتروني</option>
                    <option>منصة تعليمية</option>
                    <option>أخرى</option>
                </select>
                <textarea rows="4" placeholder="تفاصيل المشروع..."></textarea>
                <button type="submit" class="btn-primary" style="width:100%; border:none; cursor:pointer;">إرسال الطلب عبر واتساب</button>
            </form>
        </div>
    </div>
</main>
<footer><p>© 2026 CyberPath Digital – جميع الحقوق محفوظة</p></footer>
<script>const body=document.body,toggle=document.getElementById('themeToggle'),icon=toggle.querySelector('i');const setTheme=(theme)=>{body.classList.remove('dark','light');body.classList.add(theme);localStorage.setItem('cpd-theme',theme);icon.className=theme==='dark'?'fas fa-moon':'fas fa-sun';};setTheme(localStorage.getItem('cpd-theme')||'dark');toggle.onclick=()=>setTheme(body.classList.contains('dark')?'light':'dark');</script>
</body>
</html>
